name: Python · Lint & Type-check

# Only services/api declares ruff + mypy config today, so lint is scoped there.
# The sibling packages are installed editable so mypy can resolve the
# cvops_steps / cvops_worker_common imports the api source pulls in.

on:
  push:
    branches: [main, dev]
    paths:
      - 'services/api/**'
      - 'packages/**'
      - '.github/workflows/lint-python.yml'
  pull_request:
    paths:
      - 'services/api/**'
      - 'packages/**'
      - '.github/workflows/lint-python.yml'

jobs:
  lint:
    name: ruff + mypy (services/api)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/api/pyproject.toml

      - name: Install dependencies
        run: >-
          pip install
          -e packages/steps
          -e packages/worker-common
          -e packages/cvat-client
          -e services/worker-preprocessing
          -e "services/api[dev]"
          respx

      - name: Ruff — lint
        working-directory: services/api
        run: ruff check src/ tests/

      - name: Ruff — format check
        working-directory: services/api
        run: ruff format --check src/ tests/

      - name: Mypy — type-check
        working-directory: services/api
        run: mypy src/
