name: SonarQube

# Single-project scan of the whole monorepo (project key `cvops`) against the
# self-hosted server. Coverage is generated in this job so the report paths in
# sonar-project.properties resolve on the same checkout the scanner indexes.
#
# Secrets (set on the repo): SONAR_TOKEN, SONAR_HOST_URL.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  scan:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history lets SonarQube assign issues to the right commit/author.
          fetch-depth: 0

      # ── Python coverage (API — the integration hub) ──────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: '**/pyproject.toml'

      - name: Install API + siblings
        run: >-
          pip install
          -e packages/steps
          -e packages/worker-common
          -e packages/cvat-client
          -e services/worker-preprocessing
          -e "services/api[dev]"
          respx

      - name: API tests + coverage
        working-directory: services/api
        # testcontainers uses the runner's Docker daemon (available by default).
        # Keep going on failure so a red test run still publishes coverage.
        continue-on-error: true
        run: pytest tests/ -q --tb=short --cov=src/cvops_api --cov-report=xml:coverage.xml

      # ── Frontend coverage (vitest v8 → lcov) ─────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json

      - name: Frontend install
        working-directory: services/frontend
        run: npm ci

      - name: Frontend tests + coverage
        working-directory: services/frontend
        continue-on-error: true
        run: npm run test:coverage

      # ── Scan ─────────────────────────────────────────────────────────────
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # Fail the build if the project's quality gate fails. Comment out to make
      # the scan informational-only while you tune the gate.
      - name: Quality gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
