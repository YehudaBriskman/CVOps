name: Claude · PR Review

# Automated reviewer. Runs on every opened/updated PR and posts inline review
# comments — no human trigger. The `prompt:` input puts the v1 action in
# headless mode; the project's own standards (CLAUDE.md, services/api/CLAUDE.md)
# are read by Claude from the checked-out tree, so the review reflects this
# repo's conventions rather than generic advice.
#
# Cost control: pinned to Sonnet (cheaper/faster than Opus and plenty for diff
# review) and the tool surface is read-only + PR comments. Skips draft PRs.

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write     # post review comments
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history so Claude can diff against the base

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review the pull request #${{ github.event.pull_request.number }}.

            Read CLAUDE.md and services/api/CLAUDE.md first — judge the diff
            against THIS repo's conventions, not generic ones. Focus on:
              - correctness bugs and missing error handling
              - the layering rule (Controller → Service → Repository) and the
                "never use `any` / unknown type" rule
              - multi-tenancy: every query must filter on org_id
              - cursor pagination, soft-delete filters, presigned-URL blob access
              - migrations and ORM models staying in sync

            Use `gh pr comment` for a short summary and inline comments only for
            real issues. Be concise; do not nitpick style the linters already
            catch. If the diff is clean, say so in one line.
          claude_args: '--model claude-sonnet-4-6'
