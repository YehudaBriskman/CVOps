name: Frontend · Build & Type-check

# typecheck + build only. `npm run lint` is intentionally omitted: eslint is not
# a declared devDependency and there is no eslint config in the repo yet, so the
# lint script cannot run. Add the lint step back once eslint is wired up.

on:
  push:
    branches: [main, dev]
    paths:
      - 'services/frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    paths:
      - 'services/frontend/**'
      - '.github/workflows/ci-frontend.yml'

jobs:
  build:
    name: tsc + vite build (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build
