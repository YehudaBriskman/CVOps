name: Frontend · Test, Lint, Type-check & Build

on:
  push:
    branches: [main, dev]
    paths:
      - 'services/frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    paths:
      - 'services/frontend/**'
      - '.github/workflows/ci-frontend.yml'

jobs:
  test:
    name: eslint + tsc + vite build + vitest (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Vitest
        run: npm test
