name: Claude · Mention

# Interactive agent. Mention "@claude" in an issue, a PR, or a review comment
# and Claude reads the full thread, then answers, implements, or fixes on a
# branch and pushes a commit. No `prompt:` input here on purpose — without one
# the v1 action runs in interactive mode, driven by the comment that triggered
# it. Auth is the OAuth token from `claude setup-token`, so usage draws on the
# existing Claude subscription rather than a separate API bill.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Only wake up when "@claude" is actually mentioned — otherwise every
    # comment on the repo would spin a runner and burn quota.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write          # push commits / branches
      pull-requests: write     # comment on and update PRs
      issues: write            # comment on issues
      id-token: write          # OIDC for the action
      actions: read            # read CI results to reason about failures
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
