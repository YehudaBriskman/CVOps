name: Workers & Steps · Tests

on:
  push:
    branches: [main]
    paths:
      - 'services/worker-preprocessing/**'
      - 'services/worker-cvat/**'
      - 'services/worker-training/**'
      - 'packages/**'
      - 'services/api/**'
      - '.github/workflows/ci-workers.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/worker-preprocessing/**'
      - 'services/worker-cvat/**'
      - 'services/worker-training/**'
      - 'packages/**'
      - 'services/api/**'
      - '.github/workflows/ci-workers.yml'

jobs:
  test:
    name: pytest (workers + steps, Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: '**/pyproject.toml'

      # Local packages are name-deps (not path/workspace deps): worker-common and
      # steps declare `cvops-api`, which is not on PyPI. Installing them in
      # separate `pip install` calls makes pip try to resolve that name from the
      # index and fail. They must all be in ONE install call so pip resolves the
      # cvops-* names from the working tree in a single resolution pass.
      - name: Install local packages (editable, single resolution pass)
        run: |
          python -m pip install --upgrade pip
          pip install \
            -e services/api \
            -e packages/worker-common \
            -e packages/cvat-client \
            -e packages/steps \
            -e "services/worker-preprocessing[dev]" \
            -e "services/worker-cvat[dev]" \
            -e "services/worker-training[dev]" \
            -e "packages/steps[dev]"

      - name: worker-preprocessing
        working-directory: services/worker-preprocessing
        run: pytest tests/ -q

      - name: worker-cvat            # testcontainers — needs Docker (present on ubuntu-latest)
        working-directory: services/worker-cvat
        run: pytest tests/ -q

      - name: worker-training
        working-directory: services/worker-training
        run: pytest tests/ -q

      - name: steps
        working-directory: packages/steps
        run: pytest tests/ -q
