name: Bug report
description: Report a reproducible bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out as much detail as possible so we can reproduce and fix the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal, reproducible steps.
      placeholder: |
        1. POST /auth/register with body { ... }
        2. Then GET /projects with Bearer token
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, Docker / docker compose version, etc.
      placeholder: |
        - OS: Ubuntu 22.04
        - Python: 3.12.3
        - Docker Compose: 2.27.0

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
