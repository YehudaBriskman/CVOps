name: Feature request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please check whether a similar request already exists.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem or limitation does this feature address? Focus on the pain, not the solution.
      placeholder: "When I try to ... I can't ..., which means ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen? Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternative approaches have you tried or considered?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API
        - Frontend
        - Workflow engine
        - Dataset versioning
        - Auth
        - Storage / blobs
        - CI / DevOps
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, references to related issues or PRs.
