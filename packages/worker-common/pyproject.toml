[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cvops-worker-common"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "cvops-api",           # Step ABC, StepContext, StorageBackend, registry, audit, DB models
  "redis[asyncio]>=5.0", # Redis Streams via redis-py async
  "httpx>=0.27",         # POST /internal/runs/{id}/advance to chain steps
]

[project.optional-dependencies]
dev = [
  "pytest>=8.2",
  "pytest-asyncio>=0.23",
]

[tool.hatch.build.targets.wheel]
packages = ["src/cvops_worker_common"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
