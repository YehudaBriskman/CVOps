services:
  # ── Data layer ──────────────────────────────────────────────────────────
  postgres:
    image: bitnami/postgresql:16
    restart: unless-stopped
    ports: ["5432:5432"]
    user: "1001:1001"
    environment:
      POSTGRESQL_DATABASE: ${POSTGRES_DB:-cvops}
      POSTGRESQL_USERNAME: ${POSTGRES_USER:-cvops}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/bitnami/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-cvops}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Bitnami doesn't publish a Garage image and the official dxflrs/garage runs as
  # root by default. We chown the named volumes once in `garage-init`, then run
  # the Garage server as UID 1000.
  garage-init:
    image: bitnami/os-shell:latest
    user: "0:0"
    command: ["chown", "-R", "1000:1000", "/var/lib/garage/meta", "/var/lib/garage/data"]
    volumes:
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    restart: "no"

  garage:
    image: dxflrs/garage:v2.3.0
    restart: unless-stopped
    user: "1000:1000"
    command: ["/garage", "server"]
    depends_on:
      garage-init:
        condition: service_completed_successfully
    ports:
      - "3900:3900"   # S3 API
      - "3903:3903"   # Admin API
    environment:
      GARAGE_DEFAULT_ACCESS_KEY: ${GARAGE_DEFAULT_ACCESS_KEY}
      GARAGE_DEFAULT_SECRET_KEY: ${GARAGE_DEFAULT_SECRET_KEY}
      GARAGE_DEFAULT_BUCKET:     ${GARAGE_DEFAULT_BUCKET:-cvops-blobs}
      GARAGE_RPC_SECRET:         ${GARAGE_RPC_SECRET}
      GARAGE_ADMIN_TOKEN:        ${GARAGE_ADMIN_TOKEN}
      GARAGE_METRICS_TOKEN:      ${GARAGE_METRICS_TOKEN}
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: bitnami/redis:7.4
    restart: unless-stopped
    ports: ["6379:6379"]
    user: "1001:1001"
    environment:
      # Local dev only. For prod, set REDIS_PASSWORD and drop ALLOW_EMPTY_PASSWORD.
      ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - redis_data:/bitnami/redis/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Application layer ───────────────────────────────────────────────────
  api:
    build:
      context: packages/api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      garage:   { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      DATABASE_URL:    postgresql+asyncpg://${POSTGRES_USER:-cvops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cvops}
      S3_ENDPOINT:     http://garage:3900
      S3_ACCESS_KEY:   ${GARAGE_DEFAULT_ACCESS_KEY}
      S3_SECRET_KEY:   ${GARAGE_DEFAULT_SECRET_KEY}
      S3_BUCKET:       ${GARAGE_DEFAULT_BUCKET:-cvops-blobs}
      S3_REGION:       garage
      REDIS_URL:       redis://redis:6379/0
      JWT_SECRET:      ${JWT_SECRET}
      WORKER_TOKEN:    ${WORKER_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # required for step.train Docker dispatch

  worker:  # Phase 2 — Celery async workers
    build:
      context: packages/worker
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
      - redis
    environment:
      DATABASE_URL:    postgresql+asyncpg://${POSTGRES_USER:-cvops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cvops}
      REDIS_URL:       redis://redis:6379/0
      S3_ENDPOINT:     http://garage:3900
      S3_ACCESS_KEY:   ${GARAGE_DEFAULT_ACCESS_KEY}
      S3_SECRET_KEY:   ${GARAGE_DEFAULT_SECRET_KEY}
      S3_BUCKET:       ${GARAGE_DEFAULT_BUCKET:-cvops-blobs}
      S3_REGION:       garage
      WORKER_TOKEN:    ${WORKER_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    profiles: ["phase2"]  # only started when --profile phase2 is passed

  frontend:
    build:
      context: packages/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports: ["3000:8080"]
    depends_on:
      - api

  nginx:
    image: bitnami/nginx:1.27
    restart: unless-stopped
    user: "1001:1001"
    # bitnami/nginx listens on 8080 because non-root can't bind to <1024
    ports: ["80:8080"]
    volumes:
      - ./nginx/nginx.conf:/opt/bitnami/nginx/conf/server_blocks/default.conf:ro
    depends_on:
      - api
      - frontend

  # ── External tools (Phase 2) ────────────────────────────────────────────
  # cvat:
  #   image: cvat/server:v2.14.3
  #   ... see docs/design/11-cvat-integration.md for full CVAT compose config

volumes:
  postgres_data:
  garage_meta:
  garage_data:
  redis_data:
