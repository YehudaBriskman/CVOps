services:
  # ── Data layer ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cvops}
      POSTGRES_USER: ${POSTGRES_USER:-cvops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-cvops}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address :9001
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Application layer ───────────────────────────────────────────────────
  api:
    build:
      context: packages/api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      minio:    { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      DATABASE_URL:    postgresql+asyncpg://${POSTGRES_USER:-cvops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cvops}
      MINIO_ENDPOINT:  http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET:    ${MINIO_BUCKET:-cvops-blobs}
      REDIS_URL:       redis://redis:6379/0
      JWT_SECRET:      ${JWT_SECRET}
      WORKER_TOKEN:    ${WORKER_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # required for step.train Docker dispatch

  worker:  # Phase 2 — Celery async workers
    build:
      context: packages/worker
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
      - redis
    environment:
      DATABASE_URL:    postgresql+asyncpg://${POSTGRES_USER:-cvops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cvops}
      REDIS_URL:       redis://redis:6379/0
      MINIO_ENDPOINT:  http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      WORKER_TOKEN:    ${WORKER_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    profiles: ["phase2"]  # only started when --profile phase2 is passed

  frontend:
    build:
      context: packages/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports: ["3000:80"]
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports: ["80:80"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend

  # ── External tools (Phase 2) ────────────────────────────────────────────
  # cvat:
  #   image: cvat/server:v2.14.3
  #   ... see docs/design/11-cvat-integration.md for full CVAT compose config

volumes:
  postgres_data:
  minio_data:
  redis_data:
