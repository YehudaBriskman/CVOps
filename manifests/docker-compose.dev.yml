# Development overrides — hot-reload, debug ports, local mounts
# Usage (from repo root):
#   docker compose -f manifests/docker-compose.yml -f manifests/docker-compose.dev.yml --env-file manifests/.env up

services:
  api:
    build:
      context: ../packages/api
      target: development
    volumes:
      - ../packages/api/src:/app/src:ro
    environment:
      RELOAD: "true"
    command: uvicorn cvops_api.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ../packages/frontend
      target: development
    ports: ["5173:5173"]
    volumes:
      - ../packages/frontend/src:/app/src:ro
    command: npm run dev -- --host 0.0.0.0
