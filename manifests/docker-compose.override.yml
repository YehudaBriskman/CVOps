# CVAT + Nuclio + model-deployer
# Auto-merged by Docker Compose on every `docker compose up`

x-backend-env: &backend-env
  CVAT_POSTGRES_HOST: cvat_db
  CVAT_REDIS_INMEM_HOST: cvat_redis_inmem
  CVAT_REDIS_INMEM_PORT: 6379
  CVAT_REDIS_ONDISK_HOST: cvat_redis_ondisk
  CVAT_REDIS_ONDISK_PORT: 6666
  CVAT_LOG_IMPORT_ERRORS: 'true'
  CVAT_ALLOW_STATIC_CACHE: 'no'
  CVAT_NUM_PROXIES: '1'
  DJANGO_LOG_SERVER_HOST: vector
  DJANGO_LOG_SERVER_PORT: 8282
  no_proxy: clickhouse,grafana,vector,nuclio,opa
  SMOKESCREEN_OPTS: ''

x-clickhouse-env: &clickhouse-env
  CLICKHOUSE_HOST: clickhouse
  CLICKHOUSE_PORT: 8123
  CLICKHOUSE_DB: cvat
  CLICKHOUSE_USER: user
  CLICKHOUSE_PASSWORD: user

x-backend-deps: &backend-deps
  cvat_redis_inmem: { condition: service_started }
  cvat_redis_ondisk: { condition: service_started }
  cvat_db:          { condition: service_started }
  cvat_clickhouse:  { condition: service_started }

x-cvat-volumes: &cvat-volumes
  - cvat_data:/home/django/data
  - cvat_keys:/home/django/keys
  - cvat_logs:/home/django/logs

services:
  # ── CVAT data layer ────────────────────────────────────────────────────────
  cvat_db:
    container_name: cvat_db
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_DB: cvat
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - cvat_db:/var/lib/postgresql/data
    networks:
      - cvat

  cvat_redis_inmem:
    container_name: cvat_redis_inmem
    image: redis:7.2.11-alpine
    restart: always
    command: ["redis-server", "--save", "60", "100", "--appendonly", "yes"]
    volumes:
      - cvat_inmem_db:/data
    networks:
      - cvat

  cvat_redis_ondisk:
    container_name: cvat_redis_ondisk
    image: apache/kvrocks:2.15.0
    restart: always
    init: true
    command: ["--compact-cron", "0 3 * * *"]
    volumes:
      - cvat_cache_db:/var/lib/kvrocks
    networks:
      - cvat

  cvat_clickhouse:
    container_name: cvat_clickhouse
    image: clickhouse/clickhouse-server:23.11-alpine
    restart: always
    environment:
      <<: *clickhouse-env
    networks:
      cvat:
        aliases:
          - clickhouse
    volumes:
      - cvat_events_db:/var/lib/clickhouse/

  cvat_opa:
    container_name: cvat_opa
    image: openpolicyagent/opa:1.12.2
    restart: always
    networks:
      cvat:
        aliases:
          - opa
    command:
      - run
      - --server
      - --addr=:8181
      - --log-level=error
      - --set=services.cvat.url=http://cvat-server:8080
      - --set=bundles.cvat.service=cvat
      - --set=bundles.cvat.resource=/api/auth/rules
      - --set=bundles.cvat.polling.min_delay_seconds=5
      - --set=bundles.cvat.polling.max_delay_seconds=15

  # ── CVAT application layer ─────────────────────────────────────────────────
  cvat_server:
    container_name: cvat_server
    image: cvat/server:dev
    restart: always
    depends_on:
      <<: *backend-deps
      cvat_opa: { condition: service_started }
    environment:
      <<: [*backend-env, *clickhouse-env]
      DJANGO_MODWSGI_EXTRA_ARGS: ''
      ALLOWED_HOSTS: '*'
      ADAPTIVE_AUTO_ANNOTATION: 'false'
      NUMPROCS: 2
      CVAT_ANALYTICS: 1
      CVAT_BASE_URL: ''
      ONE_RUNNING_JOB_IN_QUEUE_PER_USER: 'false'
      CVAT_SERVERLESS: 1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: init run server nginx
    labels:
      traefik.enable: "true"
      traefik.http.services.cvat.loadbalancer.server.port: "8080"
      # Host-agnostic: route by path only, so CVAT is reachable from localhost, a
      # dev VM IP, or a tailnet address alike (cvat_server's ALLOWED_HOSTS='*'
      # lets Django accept any Host). This rule is longer than cvat-ui's, so
      # Traefik gives it higher priority — /api etc. hit the server and the rest
      # falls through to the UI SPA.
      traefik.http.routers.cvat.rule: >-
        PathPrefix(`/api/`) || PathPrefix(`/static/`) ||
        PathPrefix(`/admin`) || PathPrefix(`/django-rq`)
      traefik.http.routers.cvat.entrypoints: web
    volumes: *cvat-volumes
    networks:
      cvat:
        aliases:
          - cvat-server

  cvat_ui:
    container_name: cvat_ui
    image: cvat/ui:dev
    restart: always
    depends_on:
      - cvat_server
    labels:
      traefik.enable: "true"
      traefik.http.services.cvat-ui.loadbalancer.server.port: "8000"
      traefik.http.routers.cvat-ui.rule: PathPrefix(`/`)
      traefik.http.routers.cvat-ui.entrypoints: web
    networks:
      - cvat

  # CVAT ships no superuser, so worker-cvat's login (CVAT_USERNAME/CVAT_PASSWORD)
  # fails out of the box. One-shot, idempotent provisioner: reuses the cvat
  # server image (Django app + DB env via *backend-env, exactly like the
  # cvat_worker_* services), waits for cvat_server to apply migrations, then
  # get_or_create + set_password an admin matching .env. Runs in every path
  # (tilt up and `docker compose --profile app`) since it has no profile, just
  # like cvat_server. Mirrors garage-init / mlflow-init.
  cvat_admin_init:
    container_name: cvat_admin_init
    image: cvat/server:dev
    restart: "no"
    depends_on:
      cvat_server: { condition: service_started }
    environment:
      <<: *backend-env
      DJANGO_SUPERUSER_USERNAME: ${CVAT_USERNAME:-admin}
      DJANGO_SUPERUSER_PASSWORD: ${CVAT_PASSWORD:-Admin1234!}
      DJANGO_SUPERUSER_EMAIL: admin@cvops.local
    entrypoint: ["bash", "-euc"]
    command:
      # $$ escapes Compose interpolation so the shell (not Compose) expands these.
      - |
        for i in $$(seq 1 120); do
          if python3 /home/django/manage.py shell -c "import os; from django.contrib.auth import get_user_model as G; U=G(); u,c=U.objects.get_or_create(username=os.environ['DJANGO_SUPERUSER_USERNAME'], defaults={'email': os.environ['DJANGO_SUPERUSER_EMAIL']}); u.is_superuser=True; u.is_staff=True; u.set_password(os.environ['DJANGO_SUPERUSER_PASSWORD']); u.save(); print('cvat admin ensured:', u.username)"; then
            exit 0
          fi
          echo "cvat_admin_init: waiting for cvat db/migrations ($$i)"; sleep 5
        done
        echo "cvat_admin_init: gave up waiting for cvat_server" >&2; exit 1
    networks:
      - cvat

  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: always
    ports:
      - "8080:8080"
    environment:
      CVAT_HOST: ${CVAT_HOST:-localhost}
      DJANGO_LOG_VIEWER_HOST: grafana
      DJANGO_LOG_VIEWER_PORT: 3000
      TRAEFIK_ACCESSLOG_FORMAT: json
      TRAEFIK_LOG_FORMAT: json
      TRAEFIK_ENTRYPOINTS_web_ADDRESS: :8080
      TRAEFIK_PROVIDERS_DOCKER_EXPOSEDBYDEFAULT: "false"
      TRAEFIK_PROVIDERS_DOCKER_NETWORK: cvat_cvat
      TRAEFIK_PROVIDERS_FILE_DIRECTORY: /etc/traefik/rules
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro,z
      - ../services/cvat/components/analytics/grafana_conf.yml:/etc/traefik/rules/grafana_conf.yml:ro,z
    networks:
      - cvat

  # ── CVAT workers ───────────────────────────────────────────────────────────
  cvat_worker_utils:
    container_name: cvat_worker_utils
    image: cvat/server:dev
    restart: always
    depends_on: *backend-deps
    environment:
      <<: *backend-env
      CVAT_REDIS_INMEM_PASSWORD: ''
      NUMPROCS: 1
    command: run worker notifications cleaning
    volumes: *cvat-volumes
    networks:
      - cvat

  cvat_worker_import:
    container_name: cvat_worker_import
    image: cvat/server:dev
    restart: always
    depends_on: *backend-deps
    environment:
      <<: *backend-env
      NUMPROCS: 2
    command: run worker import
    volumes: *cvat-volumes
    networks:
      - cvat

  cvat_worker_export:
    container_name: cvat_worker_export
    image: cvat/server:dev
    restart: always
    depends_on: *backend-deps
    environment:
      <<: [*backend-env, *clickhouse-env]
      NUMPROCS: 2
    command: run worker export
    volumes: *cvat-volumes
    networks:
      - cvat

  cvat_worker_annotation:
    container_name: cvat_worker_annotation
    image: cvat/server:dev
    restart: always
    depends_on: *backend-deps
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *backend-env
      NUMPROCS: 1
    command: run worker annotation
    volumes: *cvat-volumes
    networks:
      - cvat

  cvat_worker_webhooks:
    container_name: cvat_worker_webhooks
    image: cvat/server:dev
    restart: always
    depends_on: *backend-deps
    environment:
      <<: *backend-env
      NUMPROCS: 1
    command: run worker webhooks --with-scheduler
    volumes: *cvat-volumes
    networks:
      - cvat

  cvat_worker_quality_reports:
    container_name: cvat_worker_quality_reports
    image: cvat/server:dev
    restart: always
    depends_on: *backend-deps
    environment:
      <<: *backend-env
      NUMPROCS: 1
    command: run worker quality_reports
    volumes: *cvat-volumes
    networks:
      - cvat

  cvat_worker_chunks:
    container_name: cvat_worker_chunks
    image: cvat/server:dev
    restart: always
    depends_on: *backend-deps
    environment:
      <<: *backend-env
      NUMPROCS: 2
    command: run worker chunks
    volumes: *cvat-volumes
    networks:
      - cvat

  cvat_worker_consensus:
    container_name: cvat_worker_consensus
    image: cvat/server:dev
    restart: always
    depends_on: *backend-deps
    environment:
      <<: *backend-env
      NUMPROCS: 1
    command: run worker consensus
    volumes: *cvat-volumes
    networks:
      - cvat

  # ── Analytics ─────────────────────────────────────────────────────────────
  cvat_vector:
    container_name: cvat_vector
    image: timberio/vector:0.26.0-alpine
    user: "1000:1000"
    restart: always
    depends_on:
      - cvat_clickhouse
    environment:
      <<: *clickhouse-env
    networks:
      cvat:
        aliases:
          - vector
    volumes:
      - ../services/cvat/components/analytics/vector/vector.toml:/etc/vector/vector.toml:ro,z
      - type: tmpfs
        target: /vector-data-dir
    # NOT optional, despite being "analytics": cvat_server and the workers ship
    # events to this log sink (DJANGO_LOG_SERVER_HOST=vector). If it's absent,
    # every event send fails DNS resolution and retries — adding ~40s to each
    # task creation. So it runs under tilt up too (the bind-mount resolves
    # because the Tiltfile inits the services/cvat submodule). Only the grafana
    # dashboard UI below stays gated — nothing blocks on it.

  cvat_grafana:
    container_name: cvat_grafana
    image: grafana/grafana-oss:10.1.2
    restart: always
    environment:
      <<: *clickhouse-env
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_AUTH_BASIC_ENABLED: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SERVER_ROOT_URL: http://${CVAT_HOST:-localhost}/analytics
      GF_INSTALL_PLUGINS: 'grafana-clickhouse-datasource 4.8.2'
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/all_events.json
    volumes:
      - ../services/cvat/components/analytics/grafana/dashboards:/var/lib/grafana/dashboards:ro,z
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat << 'EOF' > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
          - name: 'ClickHouse'
            type: 'grafana-clickhouse-datasource'
            isDefault: true
            jsonData:
              defaultDatabase: $${CLICKHOUSE_DB}
              port: $${CLICKHOUSE_PORT}
              server: $${CLICKHOUSE_HOST}
              username: $${CLICKHOUSE_USER}
              tlsSkipVerify: false
              protocol: http
            secureJsonData:
              password: $${CLICKHOUSE_PASSWORD}
            editable: true
        EOF
        mkdir -p /etc/grafana/provisioning/dashboards
        cat << EOF > /etc/grafana/provisioning/dashboards/dashboard.yaml
        apiVersion: 1
        providers:
          - name: cvat-logs
            type: file
            updateIntervalSeconds: 30
            options:
              path: /var/lib/grafana/dashboards
              foldersFromFilesStructure: true
        EOF
        exec /run.sh
    networks:
      cvat:
        aliases:
          - grafana
    # Analytics dashboards — submodule-backed, not needed for the review flow.
    profiles: ["app", "all"]

  # ── Nuclio (AI model serving for CVAT) ────────────────────────────────────
  nuclio:
    container_name: nuclio
    image: quay.io/nuclio/dashboard:1.15.9-amd64
    restart: always
    networks:
      - cvat
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "962"
    security_opt:
      - label:disable
    environment:
      http_proxy: ''
      https_proxy: ''
      no_proxy: ''
      NUCLIO_CHECK_FUNCTION_CONTAINERS_HEALTHINESS: 'true'
      NUCLIO_DASHBOARD_DEFAULT_FUNCTION_MOUNT_MODE: 'volume'
    logging:
      driver: "json-file"
      options:
        max-size: 100m
        max-file: "3"
    # Auto-label serving layer — not needed for the human-review (View in CVAT)
    # flow, and first start bootstraps a YOLO image. Profile-gated so the Tilt
    # inner loop skips it; start_env.sh (--profile app) still brings it up.
    profiles: ["app", "all"]

  worker-cvat:
    # CVAT-queue worker: runs step.human_review (push gate) and, on a CVAT
    # completion webhook, pulls reviewed annotations back into
    # annotation_revisions and resumes the gated run. Lives here (not the base
    # compose) because it needs the `cvat` network to reach cvat_server, while
    # still depending on the base infra (postgres/redis/garage).
    build:
      context: ..
      dockerfile: services/worker-cvat/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:    { condition: service_healthy }
      redis:       { condition: service_healthy }
      garage:      { condition: service_healthy }
      cvat_server: { condition: service_started }
    environment:
      DATABASE_URL:        postgresql+asyncpg://${POSTGRES_USER:-cvops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cvops}
      REDIS_URL:           redis://redis:6379/0
      REDIS_STREAM:        cvat
      S3_ENDPOINT:         http://garage:3900
      S3_ACCESS_KEY:       ${GARAGE_DEFAULT_ACCESS_KEY}
      S3_SECRET_KEY:       ${GARAGE_DEFAULT_SECRET_KEY}
      S3_BUCKET:           ${GARAGE_DEFAULT_BUCKET:-cvops-blobs}
      S3_REGION:           garage
      WORKER_TOKEN:        ${WORKER_TOKEN}
      API_BASE_URL:        http://api:8000
      CVAT_HOST:           http://cvat_server:8080
      CVAT_PUBLIC_URL:     ${CVAT_PUBLIC_URL:-http://localhost:8080}
      CVAT_USERNAME:       ${CVAT_USERNAME:-admin}
      CVAT_PASSWORD:       ${CVAT_PASSWORD:-Admin1234!}
      CVAT_WEBHOOK_SECRET: ${CVAT_WEBHOOK_SECRET}
      # CVAT posts review-completion webhooks back to the API at this URL.
      CVAT_WEBHOOK_TARGET: http://api:8000/api/v1/internal/cvat/webhook
    networks:
      - default
      - cvat
    profiles: ["app", "all"]

volumes:
  cvat_db:
  cvat_data:
  cvat_keys:
  cvat_logs:
  cvat_inmem_db:
  cvat_events_db:
  cvat_cache_db:

networks:
  # Compose-managed (was external) so `tilt up` and start_env.sh both create it
  # without a manual `docker network create`. The Docker network name stays
  # `cvat_cvat`, so nuctl deploys (--platform-config network: cvat_cvat) and
  # traefik's provider network still resolve it by name.
  cvat:
    name: cvat_cvat
