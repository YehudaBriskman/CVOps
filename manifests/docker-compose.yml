name: cvops

services:
  # ── Data layer ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-cvops}
      POSTGRES_USER:     ${POSTGRES_USER:-cvops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-cvops}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # The official dxflrs/garage image runs as root by default. We chown the
  # named volumes once in `garage-init`, then run the Garage server as UID 1000.
  garage-init:
    image: alpine:3.20
    user: "0:0"
    command: ["chown", "-R", "1000:1000", "/var/lib/garage/meta", "/var/lib/garage/data"]
    volumes:
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    restart: "no"

  garage:
    image: dxflrs/garage:v2.3.0
    restart: unless-stopped
    user: "1000:1000"
    command: ["/garage", "server"]
    depends_on:
      garage-init:
        condition: service_completed_successfully
    ports:
      - "3900:3900"   # S3 API
      - "3903:3903"   # Admin API
    environment:
      GARAGE_DEFAULT_ACCESS_KEY: ${GARAGE_DEFAULT_ACCESS_KEY}
      GARAGE_DEFAULT_SECRET_KEY: ${GARAGE_DEFAULT_SECRET_KEY}
      GARAGE_DEFAULT_BUCKET:     ${GARAGE_DEFAULT_BUCKET:-cvops-blobs}
      GARAGE_RPC_SECRET:         ${GARAGE_RPC_SECRET}
      GARAGE_ADMIN_TOKEN:        ${GARAGE_ADMIN_TOKEN}
      GARAGE_METRICS_TOKEN:      ${GARAGE_METRICS_TOKEN}
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Application layer (opt-in via profiles) ─────────────────────────────
  #
  # Profiles:
  #   (default, no profile) → infra only (postgres, redis, garage). Tilt uses this.
  #   --profile app         → api + frontend + nginx + worker-preprocessing (prod-target builds)
  #   --profile all         → everything
  #
  # For dev-target container builds, layer docker-compose.dev.yml on top:
  #   docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile app up
  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
      target: production
      # cvops-steps is a sibling package; expose it as a named build context so
      # the image's step registry is populated (see services/api/Dockerfile).
      additional_contexts:
        steps: ../packages/steps
    restart: unless-stopped
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      garage:   { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      DATABASE_URL:    postgresql+asyncpg://${POSTGRES_USER:-cvops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cvops}
      S3_ENDPOINT:     http://garage:3900
      # Presign host is derived per-request from the browser's Host header, so
      # uploads work from localhost and dev VMs alike. Set PUBLIC_HOST only to
      # force a fixed host (otherwise this stays empty → dynamic).
      S3_PUBLIC_ENDPOINT: ${PUBLIC_HOST:+http://${PUBLIC_HOST}:3900}
      S3_ACCESS_KEY:   ${GARAGE_DEFAULT_ACCESS_KEY}
      S3_SECRET_KEY:   ${GARAGE_DEFAULT_SECRET_KEY}
      S3_BUCKET:       ${GARAGE_DEFAULT_BUCKET:-cvops-blobs}
      S3_REGION:       garage
      REDIS_URL:       redis://redis:6379/0
      JWT_SECRET:      ${JWT_SECRET}
      WORKER_TOKEN:    ${WORKER_TOKEN}
      # worker-cvat exposes GET /models on :8001 (proxied by cvat.py router).
      MODEL_DEPLOYER_URL: http://worker-cvat:8001
      # Verifies HMAC signatures on CVAT review-completion webhooks.
      CVAT_WEBHOOK_SECRET: ${CVAT_WEBHOOK_SECRET}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # required for step.train Docker dispatch
    profiles: ["app", "all"]

  worker-preprocessing:  # Redis-Streams preprocessing worker (extract_frames, …)
    build:
      # Repo root: the worker image installs the sibling cvops-api + cvops-steps
      # packages, which live outside services/worker-preprocessing.
      context: ..
      dockerfile: services/worker-preprocessing/Dockerfile
    restart: unless-stopped
    # Consumes the `preprocessing` stream and writes directly to PG + Garage —
    # it never calls the API. In the app/all profiles so the ingest flow works
    # end-to-end under `--profile app`.
    depends_on:
      postgres: { condition: service_healthy }
      garage:   { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      DATABASE_URL:    postgresql+asyncpg://${POSTGRES_USER:-cvops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cvops}
      REDIS_URL:       redis://redis:6379/0
      REDIS_STREAM:    preprocessing
      S3_ENDPOINT:     http://garage:3900
      S3_ACCESS_KEY:   ${GARAGE_DEFAULT_ACCESS_KEY}
      S3_SECRET_KEY:   ${GARAGE_DEFAULT_SECRET_KEY}
      S3_BUCKET:       ${GARAGE_DEFAULT_BUCKET:-cvops-blobs}
      S3_REGION:       garage
      WORKER_TOKEN:    ${WORKER_TOKEN}
    deploy:
      replicas: 2   # SELECT FOR UPDATE SKIP LOCKED makes this concurrency-safe
    profiles: ["app", "all"]

  worker-training:
    build:
      context: ..
      dockerfile: services/worker-training/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      garage:   { condition: service_healthy }
      mlflow:   { condition: service_healthy }
    environment:
      DATABASE_URL:    postgresql+asyncpg://${POSTGRES_USER:-cvops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cvops}
      REDIS_URL:       redis://redis:6379/0
      REDIS_STREAM:    training
      # train.py forwards this into the trainer subprocess; that's the whole
      # executor-side wiring — the trainer logs to this server.
      MLFLOW_TRACKING_URI: http://mlflow:5000
      S3_ENDPOINT:     http://garage:3900
      S3_ACCESS_KEY:   ${GARAGE_DEFAULT_ACCESS_KEY}
      S3_SECRET_KEY:   ${GARAGE_DEFAULT_SECRET_KEY}
      S3_BUCKET:       ${GARAGE_DEFAULT_BUCKET:-cvops-blobs}
      S3_REGION:       garage
      WORKER_TOKEN:    ${WORKER_TOKEN}
      API_BASE_URL:    http://api:8000
      DOCKER_TIMEOUT:  "7200"
    profiles: ["worker", "all"]

  frontend:
    build:
      context: ../services/frontend
      dockerfile: Dockerfile
      target: production
      # Vite env vars are baked at build time, so the MLflow origin must be a
      # build arg (not a runtime env). The model page links the browser straight
      # at this origin; default to the host-published :5000.
      args:
        VITE_MLFLOW_URL: ${VITE_MLFLOW_URL:-http://localhost:5000}
    restart: unless-stopped
    # nginx-unprivileged listens on 8080 (UID 101, no root anywhere)
    ports: ["3000:8080"]
    depends_on:
      - api
    profiles: ["app", "all"]

  nginx:
    # Rootless nginx: UID 101, listens on 8080 (no root in this container).
    # No profile: it's part of the base stack so `tilt up` (which loads only
    # this compose file, no profiles) brings it up alongside the infra. It
    # proxies /api/v1 to the host API (see nginx.conf), so it needs no api
    # container — host.docker.internal resolves via the host-gateway alias.
    image: nginxinc/nginx-unprivileged:1.27-alpine
    restart: unless-stopped
    ports: ["80:8080"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # `:z` lets the SELinux-labeled host files be readable inside the container
      # on Fedora/RHEL hosts. No-op on Ubuntu/macOS.
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro,z
      # Placeholder static site. Swap for the frontend `dist/` build later.
      - ./nginx/html:/usr/share/nginx/html:ro,z

  # ── MLflow tracking server ──────────────────────────────────────────────
  # No profile: like nginx/garage-init, MLflow is part of the base stack so
  # `tilt up` (which loads this compose file with no profiles) brings it up
  # alongside the infra, and `--profile app/all` includes it too.

  # One-shot, idempotent: create the `mlflow` database in the existing Postgres
  # so MLflow's auto-managed tables never mix with the Alembic-managed `cvops`
  # schema. Mirrors garage-init's run-once-then-exit shape.
  mlflow-init:
    image: postgres:16-alpine
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: ["sh", "-c"]
    command:
      - >-
        psql -h postgres -U ${POSTGRES_USER:-cvops} -d ${POSTGRES_DB:-cvops}
        -tc "SELECT 1 FROM pg_database WHERE datname='mlflow'" | grep -q 1
        || createdb -h postgres -U ${POSTGRES_USER:-cvops} mlflow

  mlflow:
    build:
      context: ../services/mlflow
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:    { condition: service_healthy }
      garage:      { condition: service_healthy }
      mlflow-init: { condition: service_completed_successfully }
    ports: ["5000:5000"]
    environment:
      # The server holds the S3 creds and proxies artifacts (--serve-artifacts),
      # so the trainer and browser reach blobs *through* MLflow — they never need
      # Garage creds themselves.
      MLFLOW_S3_ENDPOINT_URL: http://garage:3900
      AWS_ACCESS_KEY_ID:      ${GARAGE_DEFAULT_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY:  ${GARAGE_DEFAULT_SECRET_KEY}
      AWS_DEFAULT_REGION:     garage
    command:
      - mlflow
      - server
      - --host=0.0.0.0
      - --port=5000
      # Sync psycopg2 driver against the dedicated `mlflow` database.
      - --backend-store-uri=postgresql://${POSTGRES_USER:-cvops}:${POSTGRES_PASSWORD}@postgres:5432/mlflow
      - --serve-artifacts
      - --artifacts-destination=s3://${GARAGE_DEFAULT_BUCKET:-cvops-blobs}/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── External tools (Phase 2) ────────────────────────────────────────────
  # cvat:
  #   image: cvat/server:v2.14.3
  #   ... see docs/design/11-cvat-integration.md for full CVAT compose config

volumes:
  postgres_data:
  garage_meta:
  garage_data:
  redis_data:
