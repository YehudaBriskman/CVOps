<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CVOps — ingest test</title>
    <style>
      :root { color-scheme: light dark; }
      body { font: 15px/1.5 system-ui, sans-serif; max-width: 46rem; margin: 2rem auto; padding: 0 1rem; }
      h1 { margin-bottom: 0.2rem; }
      .sub { color: #888; margin-top: 0; }
      fieldset { border: 1px solid #8884; border-radius: 6px; margin: 1rem 0; }
      label { display: block; margin: 0.4rem 0 0.1rem; font-size: 0.85rem; color: #888; }
      input { font: inherit; padding: 0.35rem 0.5rem; width: 100%; box-sizing: border-box; }
      button { font: inherit; padding: 0.5rem 1.1rem; cursor: pointer; border-radius: 6px; border: 1px solid #8886; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      #log { background: #111; color: #9f9; padding: 0.8rem; border-radius: 6px; height: 16rem; overflow: auto; white-space: pre-wrap; font-family: ui-monospace, monospace; font-size: 0.8rem; }
      #samples { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 1rem; }
      #samples img { width: 96px; height: 96px; object-fit: cover; border-radius: 4px; border: 1px solid #8884; }
      .ok { color: #6c6; } .err { color: #f77; } .dim { color: #888; }
    </style>
  </head>
  <body>
    <h1>CVOps</h1>
    <p class="sub">Ingest test page — served by nginx, talks to <code>/api/v1</code>. Swap for the frontend <code>dist/</code> later.</p>

    <fieldset>
      <legend>Credentials (a fresh dev user is generated each load)</legend>
      <label for="email">Email</label>
      <input id="email" />
      <label for="password">Password</label>
      <input id="password" value="dev-password-123" />
    </fieldset>

    <fieldset>
      <legend>Video</legend>
      <label for="file">Pick a video file</label>
      <input id="file" type="file" accept="video/*" />
    </fieldset>

    <button id="go">Run ingest</button>

    <h3>Log</h3>
    <div id="log"></div>
    <h3>Extracted samples</h3>
    <div id="samples"></div>

    <script>
      const API = "/api/v1";
      const $ = (id) => document.getElementById(id);
      // Avoid reserved TLDs (.test/.local/example.com) — email-validator rejects them.
      $("email").value = `dev-${Math.random().toString(36).slice(2, 10)}@cvops.dev`;
      // org name is globally unique — make a fresh one per load to avoid collisions.
      const ORG = `ingest-test-${Math.random().toString(36).slice(2, 8)}`;

      const logEl = $("log");
      function log(msg, cls) {
        const line = document.createElement("div");
        if (cls) line.className = cls;
        line.textContent = msg;
        logEl.appendChild(line);
        logEl.scrollTop = logEl.scrollHeight;
      }

      // SHA-256 → "sha256:<hex>". Prefer WebCrypto (secure contexts: https or
      // localhost); fall back to a pure-JS impl for http://<dev-vm> where
      // crypto.subtle is unavailable.
      async function sha256Hex(buf) {
        if (window.crypto && crypto.subtle) {
          const digest = await crypto.subtle.digest("SHA-256", buf);
          return [...new Uint8Array(digest)].map((b) => b.toString(16).padStart(2, "0")).join("");
        }
        return sha256Fallback(new Uint8Array(buf));
      }

      // Minimal pure-JS SHA-256 (used only when WebCrypto is absent).
      function sha256Fallback(bytes) {
        function rotr(n, x) { return (x >>> n) | (x << (32 - n)); }
        const K = [0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
        let h = [0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
        const l = bytes.length;
        const withOne = new Uint8Array((((l + 8) >> 6) + 1) * 64);
        withOne.set(bytes);
        withOne[l] = 0x80;
        const bits = l * 8;
        const dv = new DataView(withOne.buffer);
        dv.setUint32(withOne.length - 4, bits >>> 0);
        dv.setUint32(withOne.length - 8, Math.floor(bits / 0x100000000));
        const w = new Uint32Array(64);
        for (let i = 0; i < withOne.length; i += 64) {
          for (let t = 0; t < 16; t++) w[t] = dv.getUint32(i + t * 4);
          for (let t = 16; t < 64; t++) {
            const s0 = rotr(7, w[t-15]) ^ rotr(18, w[t-15]) ^ (w[t-15] >>> 3);
            const s1 = rotr(17, w[t-2]) ^ rotr(19, w[t-2]) ^ (w[t-2] >>> 10);
            w[t] = (w[t-16] + s0 + w[t-7] + s1) | 0;
          }
          let [a,b,c,d,e,f,g,hh] = h;
          for (let t = 0; t < 64; t++) {
            const S1 = rotr(6,e) ^ rotr(11,e) ^ rotr(25,e);
            const ch = (e & f) ^ (~e & g);
            const t1 = (hh + S1 + ch + K[t] + w[t]) | 0;
            const S0 = rotr(2,a) ^ rotr(13,a) ^ rotr(22,a);
            const maj = (a & b) ^ (a & c) ^ (b & c);
            const t2 = (S0 + maj) | 0;
            hh=g; g=f; f=e; e=(d+t1)|0; d=c; c=b; b=a; a=(t1+t2)|0;
          }
          h = [h[0]+a|0, h[1]+b|0, h[2]+c|0, h[3]+d|0, h[4]+e|0, h[5]+f|0, h[6]+g|0, h[7]+hh|0];
        }
        return h.map((x) => (x >>> 0).toString(16).padStart(8, "0")).join("");
      }

      let TOKEN = null;
      async function api(method, path, body) {
        const headers = {};
        if (TOKEN) headers.Authorization = `Bearer ${TOKEN}`;
        if (body) headers["Content-Type"] = "application/json";
        const res = await fetch(API + path, {
          method,
          headers,
          body: body ? JSON.stringify(body) : undefined,
        });
        if (!res.ok) throw new Error(`${method} ${path} → ${res.status} ${await res.text()}`);
        return res.status === 204 ? null : res.json();
      }

      async function run() {
        $("go").disabled = true;
        logEl.textContent = "";
        $("samples").innerHTML = "";
        try {
          const file = $("file").files[0];
          if (!file) throw new Error("Pick a video file first.");

          log("Registering dev user…");
          const reg = await api("POST", "/auth/register", {
            email: $("email").value,
            password: $("password").value,
            org_name: ORG,
          });
          TOKEN = reg.access_token;
          log("✓ authenticated", "ok");

          const project = await api("POST", "/projects/", { name: "ingest-test" });
          log(`✓ project ${project.id}`, "ok");

          const wf = await api("POST", `/projects/${project.id}/workflows`, {
            name: "ingest",
            definition: {
              steps: [{
                id: "extract",
                type: "step.extract_frames",
                config: { interval_seconds: 1.0 },
                inputs: { source_id: "$run.params.source_id" },
              }],
              edges: [],
            },
          });
          log(`✓ workflow ${wf.id}`, "ok");

          await api("PATCH", `/projects/${project.id}`, { default_ingest_workflow_id: wf.id });
          log("✓ set as default ingest workflow", "ok");

          const ds = await api("POST", `/projects/${project.id}/data-sources`, { type: "video" });
          const sourceId = ds.data_source.id;
          log(`✓ data source ${sourceId}`, "ok");

          log(`Hashing ${file.name} (${file.size} bytes)…`);
          const blobHash = "sha256:" + (await sha256Hex(await file.arrayBuffer()));
          log(`  ${blobHash}`, "dim");

          log("Uploading directly to Garage (presigned PUT)…");
          const put = await fetch(ds.presigned_put_url, { method: "PUT", body: file });
          if (!put.ok) throw new Error(`upload PUT → ${put.status}`);
          log("✓ upload complete", "ok");

          log("Confirming upload (backend registers blob + dispatches run)…");
          const confirm = await api("POST", `/data-sources/${sourceId}/confirm-upload`, { blob_hash: blobHash });
          log(`✓ status=${confirm.data_source.status} run_id=${confirm.run_id}`, "ok");
          if (!confirm.run_id) throw new Error("no run dispatched — default workflow not set?");

          log("Polling run…");
          let status = "pending";
          const terminal = ["succeeded", "failed", "cancelled"];
          for (let i = 0; i < 120 && !terminal.includes(status); i++) {
            await new Promise((r) => setTimeout(r, 1000));
            const run = await api("GET", `/runs/${confirm.run_id}`);
            if (run.status !== status) { status = run.status; log(`  run: ${status}`); }
          }
          log(status === "succeeded" ? "✓ run succeeded" : `run ended: ${status}`, status === "succeeded" ? "ok" : "err");

          log("Fetching samples…");
          const samples = await api("GET", `/projects/${project.id}/samples?source_id=${sourceId}&limit=100`);
          const items = samples.items || [];
          log(`✓ ${items.length} samples`, "ok");
          for (const s of items) {
            try {
              const u = await api("GET", `/samples/${s.id}/thumbnail-url`).catch(() => api("GET", `/samples/${s.id}/image-url`));
              const img = document.createElement("img");
              img.src = u.url || u;
              $("samples").appendChild(img);
            } catch (_) { /* skip un-fetchable */ }
          }
        } catch (err) {
          log("✗ " + err.message, "err");
        } finally {
          $("go").disabled = false;
        }
      }

      $("go").addEventListener("click", run);
    </script>
  </body>
</html>
