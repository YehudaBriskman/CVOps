server {
    # nginx-unprivileged runs as UID 101 and cannot bind <1024
    listen 8080;
    server_name _;

    # Direct client→Garage PUT is the upload path, so the API never proxies
    # large bodies. 0 = no limit, a safety margin for anything that does.
    client_max_body_size 0;

    # ── API v1 ──────────────────────────────────────────────────────────
    # /api/v1/* → FastAPI, passed through UNCHANGED. The API owns the /api/v1
    # prefix (routers are mounted under it in main.py), so there is no rewrite
    # here — proxy_pass has no URI, which forwards the original path verbatim.
    # One prefix, defined in one place.
    #
    # Upstream is the host, not a container: in Tilt the API runs as a host
    # uvicorn process, and in `docker compose --profile app` the api container
    # publishes 8000 to the host. host.docker.internal (via extra_hosts
    # host-gateway in compose) reaches both. One config, both modes.
    location /api/v1/ {
        proxy_pass         http://host.docker.internal:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;   # long timeout for synchronous run execution (Phase 1)
    }

    # ── SSE run events stream (no buffering) ────────────────────────────
    location /api/v1/runs/ {
        proxy_pass         http://host.docker.internal:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   Connection "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # ── Dataset viewer (throwaway server-rendered page) ─────────────────
    # /dataset is a server-rendered HTML page on the API, not under /api/v1.
    # Without this it would fall through to the SPA placeholder below. Exact
    # match so it can't shadow a future /dataset* SPA route. Host is forwarded
    # so the API signs presigned Garage URLs against the browser's host.
    location = /dataset {
        proxy_pass         http://host.docker.internal:8000/dataset;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend (Vite dev server) ──────────────────────────────────────
    # Proxies to the host Vite dev server so the real React app is reachable
    # at the edge (http://localhost, http://<dev-vm>) with HMR. The Upgrade/
    # Connection headers carry Vite's HMR websocket through the proxy.
    # Later this swaps to serving a static dist/ build from this root.
    location / {
        proxy_pass         http://host.docker.internal:5173;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
