server {
    # nginx-unprivileged runs as UID 101 and cannot bind <1024
    listen 8080;
    server_name _;

    # Direct client→Garage PUT is the upload path, so the API never proxies
    # large bodies. 0 = no limit, a safety margin for anything that does.
    client_max_body_size 0;

    # ── API v1 ──────────────────────────────────────────────────────────
    # /api/v1/* → FastAPI at the container root. The trailing slash on
    # proxy_pass strips the /api/v1 prefix, so /api/v1/auth/login hits
    # http://api:8000/auth/login. The versioned prefix leaves room to point
    # /api/v2 at a different upstream later.
    location /api/v1/ {
        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;   # long timeout for synchronous run execution (Phase 1)
    }

    # ── SSE run events stream (no buffering) ────────────────────────────
    location /api/v1/runs/ {
        proxy_pass         http://api:8000/runs/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # ── Static frontend ─────────────────────────────────────────────────
    # Serves a placeholder index.html for now. Later the frontend `dist/`
    # build output is mounted/copied into this root; the SPA fallback
    # (try_files … /index.html) keeps client-side routing working.
    location / {
        root      /usr/share/nginx/html;
        index     index.html;
        try_files $uri $uri/ /index.html;
    }
}
