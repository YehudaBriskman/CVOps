# ─────────────────────────────────────────────────────────────────────────
# SonarQube — single project for the whole CVOps monorepo.
#
# One project key (`cvops`) covers every service and package. We index the
# whole tree (sonar.sources=.) and let the language sensors pick the Python and
# TypeScript files; tests are split out by pattern (sonar.test.inclusions) so a
# new package is picked up automatically with no edits here.
#
# Host URL and auth token are NOT stored here — they are passed at scan time:
#   • locally  → scripts/sonar-scan.sh reads scripts/.sonar.env (gitignored)
#   • CI       → SONAR_HOST_URL / SONAR_TOKEN GitHub secrets
# ─────────────────────────────────────────────────────────────────────────

sonar.projectKey=cvops
sonar.projectName=CVOps
sonar.projectVersion=0.1.0
sonar.sourceEncoding=UTF-8

# The scanner-cli Docker image (local) and the scan action (CI) both bundle a
# JRE, so skip the server JRE download — it otherwise hangs the run on startup.
sonar.scanner.skipJreProvisioning=true

# Index the whole repo; exclusions/inclusions below carve it into main vs test.
sonar.sources=.
sonar.tests=.

# Anything matching these is classified as test code, not analysed as product.
sonar.test.inclusions=\
  **/tests/**,\
  **/test/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/e2e/**,\
  **/conftest.py

# Kept out of analysis entirely: deps, build output, venvs, generated code,
# vendored submodule (CVAT), docs, infra, and the local scanner workdir.
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/.venv/**,\
  **/venv/**,\
  **/__pycache__/**,\
  **/*.egg-info/**,\
  **/htmlcov/**,\
  **/coverage/**,\
  **/.scannerwork/**,\
  **/alembic/versions/**,\
  **/*.json,\
  services/cvat/**,\
  manifests/**,\
  brand/**,\
  docs/**,\
  **/*.md

# Don't compute coverage on test files themselves.
sonar.coverage.exclusions=\
  **/tests/**,\
  **/test/**,\
  **/e2e/**,\
  **/*.test.*,\
  **/*.spec.*,\
  **/conftest.py,\
  services/*/src/**/__init__.py

# ── Python ────────────────────────────────────────────────────────────────
sonar.python.version=3.12
# pytest-cov (--cov-report=xml) output, one per package. Missing files are
# skipped with a warning, so coverage can be rolled out package by package.
sonar.python.coverage.reportPaths=\
  services/api/coverage.xml,\
  services/worker-training/coverage.xml,\
  services/worker-cvat/coverage.xml,\
  services/model-deployer/coverage.xml,\
  packages/cvat-client/coverage.xml,\
  packages/worker-common/coverage.xml

# ── TypeScript / JavaScript (frontend) ──────────────────────────────────────
sonar.javascript.lcov.reportPaths=services/frontend/coverage/lcov.info
sonar.typescript.tsconfigPath=services/frontend/tsconfig.json
