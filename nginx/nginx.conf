server {
    listen 8080;
    server_name _;

    # ── API ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;   # long timeout for synchronous run execution (Phase 1)
    }

    # ── SSE run events stream (no buffering) ────────────────────────────
    location /api/runs/ {
        proxy_pass         http://api:8000/runs/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_buffering    off;
        proxy_cache        off;
    }

    # ── Frontend (bitnami/nginx in the frontend container also listens on 8080) ─
    location / {
        proxy_pass         http://frontend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
